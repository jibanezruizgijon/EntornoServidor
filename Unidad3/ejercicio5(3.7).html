<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito</title>
</head>

<body>
    <h2>Calcular el tiempo que tarda en llenar un depósito cilíndrico</h2>
    <form action="deposito.php" method="post">
        <label for="diametro">Diámetro del cilindro:</label>
        <input type="number" name="diametro"  step="0.01" min="0" required>
        <br><br>

        <label for="altura">Altura del cilindro:</label>
        <input type="number" name="altura"  step="0.01"  required>
        <br><br>

        <label for="caudal">Caudal de aceite(litros por minuto):</label>
        <input type="number" name="caudal"  step="0.01" required>
        <br><br>

        <input type="submit" value="Calcular tiempo">
    </form>

</body>

</html>
